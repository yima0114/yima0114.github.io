<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Screenprinting works by Yi Ma.">
  <title>Screenprinting | Yi Ma</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="site-header">
    <a class="site-name" href="index.html">Yi Ma</a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="pipe-lady.html">Pipe Lady</a>
      <a href="jem.html">Jewelry</a>
      <a href="cv.html">CV</a>
    </nav>
  </header>

  <main id="main-content">
    <header class="page-intro">
      <p class="eyebrow">Screenprinting</p>
      <h1>Screenprinting</h1>
      <p>Selected screenprinting works on paper.</p>
    </header>

    <section class="work-section" aria-labelledby="printmaking-heading">
      <div class="section-heading">
        <h2 id="printmaking-heading">Printmaking</h2>
      </div>

      <div class="gallery printmaking-grid">
        <figure class="work-card printmaking-card" data-images="web-images/printmaking/divine-comedy.JPG">
          <img src="web-images/printmaking/divine-comedy.JPG" alt="Divine Comedy by Yi Ma" loading="lazy">
          <figcaption>
            <h3>Divine Comedy</h3>
            <p class="work-meta">Screen printing on paper, 22 × 15 in</p>
          </figcaption>
        </figure>
        <figure class="work-card printmaking-card" data-images="web-images/printmaking/new-york-times.jpg">
          <img src="web-images/printmaking/new-york-times.jpg" alt="New York Times by Yi Ma" loading="lazy">
          <figcaption>
            <h3>New York Times</h3>
            <p class="work-meta">Screen printing on paper, 22 × 30 in</p>
          </figcaption>
        </figure>
      </div>
    </section>


  </main>

  <footer class="site-footer">
    <p>&copy; Yi Ma 2026 &middot; All artworks, images, and texts on this website are protected by copyright.</p>
    <a href="mailto:yima0114@gmail.com">yima0114@gmail.com</a>
  </footer>
  <div class="jewelry-lightbox" id="jewelry-lightbox" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="jewelry-lightbox-title">
    <button class="jewelry-lightbox__close" type="button" aria-label="Close gallery">&times;</button>
    <div class="jewelry-lightbox__panel">
      <div class="jewelry-lightbox__header">
        <h2 id="jewelry-lightbox-title"></h2>
        <p class="jewelry-lightbox__counter" id="jewelry-lightbox-counter"></p>
      </div>
      <div class="jewelry-lightbox__stage">
        <button class="jewelry-lightbox__nav jewelry-lightbox__prev" type="button" aria-label="Previous image">&lsaquo;</button>
        <img class="jewelry-lightbox__image" alt="">
        <button class="jewelry-lightbox__nav jewelry-lightbox__next" type="button" aria-label="Next image">&rsaquo;</button>
      </div>
      <div class="jewelry-lightbox__dots" aria-label="Gallery image selector" hidden></div>
    </div>
  </div>
  <script>
    (() => {
      const cards = document.querySelectorAll(
        '[aria-labelledby="printmaking-heading"] .work-card[data-images]'
      );
      const lightbox = document.getElementById('jewelry-lightbox');
      const title = document.getElementById('jewelry-lightbox-title');
      const counter = document.getElementById('jewelry-lightbox-counter');
      const image = lightbox.querySelector('.jewelry-lightbox__image');
      const dots = lightbox.querySelector('.jewelry-lightbox__dots');
      const closeButton = lightbox.querySelector('.jewelry-lightbox__close');
      const previousButton = lightbox.querySelector('.jewelry-lightbox__prev');
      const nextButton = lightbox.querySelector('.jewelry-lightbox__next');
      let activeImages = [];
      let activeIndex = 0;
      let activeTitle = '';
      let previousFocus = null;

      const render = () => {
        const imagePath = activeImages[activeIndex];
        image.src = imagePath;
        image.alt = `${activeTitle}, image ${activeIndex + 1} of ${activeImages.length}`;
        title.textContent = activeTitle;
        counter.textContent = `${activeIndex + 1} / ${activeImages.length}`;
        previousButton.disabled = activeImages.length < 2;
        nextButton.disabled = activeImages.length < 2;
        dots.replaceChildren();
        dots.hidden = activeImages.length < 2;
        if (dots.hidden) return;

        activeImages.forEach((_, index) => {
          const dot = document.createElement('button');
          dot.className = 'jewelry-lightbox__dot';
          dot.type = 'button';
          dot.setAttribute('aria-label', `Show image ${index + 1} of ${activeImages.length}`);
          dot.setAttribute('aria-current', index === activeIndex ? 'true' : 'false');
          dot.addEventListener('click', () => {
            activeIndex = index;
            render();
          });
          dots.append(dot);
        });
      };

      const openLightbox = (card) => {
        activeImages = card.dataset.images.split(',').map((path) => path.trim()).filter(Boolean);
        if (!activeImages.length) return;
        activeIndex = Number(card.dataset.startIndex || 0);
        if (activeIndex < 0 || activeIndex >= activeImages.length) activeIndex = 0;
        activeTitle = card.dataset.lightboxTitle || card.querySelector('h3')?.textContent.trim() || 'Jewelry work';
        previousFocus = document.activeElement;
        render();
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.classList.add('lightbox-open');
        closeButton.focus();
      };

      const closeLightbox = () => {
        lightbox.classList.remove('is-open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('lightbox-open');
        image.src = '';
        if (previousFocus) previousFocus.focus();
      };

      const moveImage = (direction) => {
        if (activeImages.length < 2) return;
        activeIndex = (activeIndex + direction + activeImages.length) % activeImages.length;
        render();
      };

      cards.forEach((card) => {
        const cardTitle = card.dataset.lightboxTitle || card.querySelector('h3')?.textContent.trim() || 'jewelry work';
        if (card.tagName !== 'BUTTON') {
          card.tabIndex = 0;
          card.setAttribute('role', 'button');
        }
        if (!card.hasAttribute('aria-label')) card.setAttribute('aria-label', `Open ${cardTitle} gallery`);
        card.addEventListener('click', () => openLightbox(card));
        if (card.tagName !== 'BUTTON') {
          card.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              openLightbox(card);
            }
          });
        }
      });

      closeButton.addEventListener('click', closeLightbox);
      previousButton.addEventListener('click', () => moveImage(-1));
      nextButton.addEventListener('click', () => moveImage(1));
      lightbox.addEventListener('click', (event) => {
        const clickedButton = event.target.closest('button');
        const clickedImageArea = event.target.closest('.jewelry-lightbox__stage');
        const clickedDotsArea = event.target.closest('.jewelry-lightbox__dots');
        if (!clickedButton && !clickedImageArea && !clickedDotsArea) closeLightbox();
      });
      document.addEventListener('keydown', (event) => {
        if (!lightbox.classList.contains('is-open')) return;
        if (event.key === 'Escape') closeLightbox();
        if (event.key === 'ArrowLeft') moveImage(-1);
        if (event.key === 'ArrowRight') moveImage(1);
      });
    })();
  </script>
  <script>
    (() => {
      const section = document.querySelector('[aria-labelledby="jem-jewelry-heading"]');
      if (!section) return;
      const buttons = section.querySelectorAll('[data-jewelry-filter]');
      const cards = section.querySelectorAll('.work-card[data-function]');
      const groups = section.querySelectorAll('[data-jewelry-group]');

      const applyFilter = (filter) => {
        cards.forEach((card) => {
          card.hidden = filter !== 'all' && card.dataset.function !== filter;
        });

        groups.forEach((group) => {
          const visibleCards = group.querySelectorAll('.work-card[data-function]:not([hidden])');
          group.hidden = filter !== 'all' && visibleCards.length === 0;
        });
      };

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          const filter = button.dataset.jewelryFilter;
          buttons.forEach((item) => {
            const active = item === button;
            item.classList.toggle('is-active', active);
            item.setAttribute('aria-pressed', String(active));
          });
          applyFilter(filter);
        });
      });
    })();
  </script>
</body>
</html>
